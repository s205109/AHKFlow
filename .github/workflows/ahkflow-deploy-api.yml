name: Deploy API Backend

on:
  push:
    branches:
      - main
      - feature/**  # Allow testing on feature branches
    paths:
      - src/Backend/**
      - .github/workflows/deploy-ahkflow-api.yml
  workflow_dispatch:  # Allow manual runs on any branch

env:
  DOTNET_VERSION: 10.0.x
  APP_SERVICE_NAME: ahkflow-api-dev
  RESOURCE_GROUP: rg-ahkflow-dev

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish src/Backend/AHKFlow.API/AHKFlow.API.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ./publish

  migrate:
    runs-on: ubuntu-latest
    needs: build
    name: Run Database Migrations
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet packages
        run: dotnet restore src/Backend/AHKFlow.API/AHKFlow.API.csproj

      - name: Build project
        run: dotnet build src/Backend/AHKFlow.API/AHKFlow.API.csproj --configuration Release --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AHKFLOW_AZURE_CREDENTIALS }}

      - name: Run Database Migration
        env:
          SQL_CONNECTION_STRING: ${{ secrets.AHKFLOW_SQL_MIGRATION_CONNECTION_STRING }}
        run: |
          echo "Running EF Core migrations..."
          cd src/Backend/AHKFlow.API

          export ASPNETCORE_ENVIRONMENT=Production
          export ConnectionStrings__DefaultConnection="$SQL_CONNECTION_STRING"

          dotnet ef database update \
            --project ../AHKFlow.Infrastructure/AHKFlow.Infrastructure.csproj \
            --startup-project . \
            --configuration Release \
            --no-build \
            --verbose

          echo "Migration completed successfully!"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    name: Deploy to Azure
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AHKFLOW_AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: ./publish

      - name: Verify API Health
        run: |
          echo "Health check with retries..."
          for i in {1..5}; do
            response=$(curl -fsk https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/api/v1/health || echo "")
            if echo "$response" | grep -q "Healthy"; then
              echo "API health check successful"
              exit 0
            fi
            echo "Retry $i/5 in 10s..."
            sleep 10
          done
          exit 1
        continue-on-error: true
