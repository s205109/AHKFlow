name: Deploy API Backend

on:
  push:
    branches:
      - main
      - feature/**  # Allow testing on feature branches
    paths:
      - src/Backend/**
      - .github/workflows/ahkflow-deploy-api.yml  # Fixed: correct filename
  workflow_dispatch:  # Allow manual runs on any branch

env:
  DOTNET_VERSION: 10.0.x
  APP_SERVICE_NAME: ahkflow-api-dev
  RESOURCE_GROUP: rg-ahkflow-dev

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish src/Backend/AHKFlow.API/AHKFlow.API.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ./publish

  migrate:
    runs-on: ubuntu-latest
    needs: build
    name: Run Database Migrations
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet packages
        run: dotnet restore src/Backend/AHKFlow.API/AHKFlow.API.csproj

      - name: Build project
        run: dotnet build src/Backend/AHKFlow.API/AHKFlow.API.csproj --configuration Release --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AHKFLOW_AZURE_CREDENTIALS }}

      - name: Run Database Migration
        env:
          SQL_CONNECTION_STRING: ${{ secrets.AHKFLOW_SQL_MIGRATION_CONNECTION_STRING }}
        run: |
          echo "Running EF Core migrations..."
          cd src/Backend/AHKFlow.API

          export ASPNETCORE_ENVIRONMENT=Production
          export ConnectionStrings__DefaultConnection="$SQL_CONNECTION_STRING"

          dotnet ef database update \
            --project ../AHKFlow.Infrastructure/AHKFlow.Infrastructure.csproj \
            --startup-project . \
            --configuration Release \
            --no-build \
            --verbose

          echo "Migration completed successfully!"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    name: Deploy to Azure
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AHKFLOW_AZURE_CREDENTIALS }}

      - name: Configure Production Environment (Secure)
        run: |
          echo "🔧 Configuring production environment with Key Vault..."

          # Get Azure AD configuration
          CLIENT_ID=$(az ad app list --display-name "AHKFlow-Dev" --query "[0].appId" -o tsv)
          TENANT_ID=$(az account show --query "tenantId" -o tsv)

          echo "✓ Retrieved Azure AD config (Client: $CLIENT_ID)"

          # Enable Managed Identity
          echo "Enabling Managed Identity..."
          az webapp identity assign \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --output none || true

          # Get Managed Identity Principal ID
          PRINCIPAL_ID=$(az webapp identity show \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query principalId -o tsv)

          echo "✓ Managed Identity enabled (Principal: $PRINCIPAL_ID)"

          # Grant Key Vault access
          echo "Granting Key Vault access..."
          az keyvault set-policy \
            --name ahkflow-kv-dev \
            --object-id $PRINCIPAL_ID \
            --secret-permissions get list \
            --output none || true

          echo "✓ Key Vault access granted"

          # Set App Service environment variables
          echo "Setting environment variables..."
          az webapp config appsettings set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              ASPNETCORE_ENVIRONMENT="Production" \
              AzureAd__ClientId="$CLIENT_ID" \
              AzureAd__TenantId="$TENANT_ID" \
              AzureAd__Instance="https://login.microsoftonline.com/" \
              AzureAd__CallbackPath="/signin-oidc" \
              AzureAd__Scopes="access_as_user" \
            --output none

          echo "✓ Environment variables configured"

          # Configure connection string with Key Vault reference
          echo "Configuring connection string..."
          SQL_SERVER_FQDN=$(az sql server show \
            --name ahkflow-sql-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query fullyQualifiedDomainName -o tsv)

          SECRET_URI=$(az keyvault secret show \
            --vault-name ahkflow-kv-dev \
            --name sql-admin-password \
            --query id -o tsv)

          CONNECTION_STRING="Server=tcp:${SQL_SERVER_FQDN},1433;Initial Catalog=ahkflow-db;User ID=ahkflowadmin;Password=@Microsoft.KeyVault(SecretUri=${SECRET_URI});Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          az webapp config connection-string set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --connection-string-type SQLAzure \
            --settings DefaultConnection="$CONNECTION_STRING" \
            --output none

          echo "✓ Connection string configured with Key Vault reference"
          echo "✅ Production environment fully configured securely!"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: ./publish

      - name: Verify API Health
        run: |
          echo "Health check with retries..."
          for i in {1..5}; do
            response=$(curl -fsk https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/api/v1/health || echo "")
            if echo "$response" | grep -q "Healthy"; then
              echo "API health check successful"
              exit 0
            fi
            echo "Retry $i/5 in 10s..."
            sleep 10
          done
          exit 1
        continue-on-error: true
