name: Deploy Blazor Frontend

on:
  push:
    branches:
      - main
      - feature/**  # Allow testing on feature branches
    paths:
      - src/Frontend/AHKFlow.UI.Blazor/**
      - .github/workflows/ahkflow-deploy-frontend.yml
  workflow_dispatch:  # Allow manual runs on any branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AHKFLOW_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ./src/Frontend/AHKFlow.UI.Blazor
          output_location: wwwroot
